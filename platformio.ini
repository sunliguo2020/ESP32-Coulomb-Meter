; ESP32 库仑计 - PlatformIO 配置
; 项目规格: 12~96V / 0~80A / 5路远程开关

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 源码目录指向 .ino 文件所在位置
src_dir = ESP32_库仑计_完整代码

; 串口监控波特率
monitor_speed = 115200

; 上传速度
upload_speed = 921600

; 依赖库 (PlatformIO 会自动下载安装)
lib_deps =
    https://github.com/bodrita/TFT_eSPI.git
    https://github.com/wollewutz/INA226.git
    https://github.com/blinker-iot/blinker-library.git

; TFT_eSPI 自定义引脚配置 (通过 User_Setup.h 覆盖默认配置)
lib_extra_dirs =
    lib

; 编译选项: 使用自定义 TFT_eSPI 引脚配置
build_flags =
    -include lib/User_Setup.h
